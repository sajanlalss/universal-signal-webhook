<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Universal Signal Webhook</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 600;
            display: block;
            margin-top: 0.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .panel {
            background: var(--card);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 {
            font-size: 1.125rem;
            margin-bottom: 1.25rem;
            color: #cbd5e1;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        th {
            text-align: left;
            color: #64748b;
            padding-bottom: 1rem;
            font-weight: 500;
        }

        td {
            padding: 0.75rem 0;
            border-bottom: 1px solid #334155;
        }

        .tag {
            padding: 0.25rem 0.625rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tag-success {
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .tag-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }

        .tag-info {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .log-line {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            padding-bottom: 0.25rem;
        }

        .level-error {
            color: #f87171;
        }

        .level-warning {
            color: #fbbf24;
        }

        .level-success {
            color: #4ade80;
        }

        button {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Universal Signal Webhook <span style="font-weight: 300; opacity: 0.5;">| Monitoring</span></h1>
            <button onclick="logout()">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-label">🔥 Total Sent</span><span id="stat-sent"
                    class="stat-val">0</span></div>
            <div class="stat-card"><span class="stat-label">🛡️ Throttled</span><span id="stat-throttled"
                    class="stat-val">0</span></div>
            <div class="stat-card"><span class="stat-label">📊 Grafana</span><span id="stat-grafana"
                    class="stat-val">0</span></div>
            <div class="stat-card"><span class="stat-label">🌐 Zabbix</span><span id="stat-zabbix"
                    class="stat-val">0</span></div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h2>Recent Notifications</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Source</th>
                                <th>Alert Content</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="msg-table"></tbody>
                    </table>
                </div>
            </div>
            <div class="panel">
                <h2>System Logs (Today)</h2>
                <div id="log-list"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/api/monitoring');
                const data = await res.json();

                // Update Stats
                document.getElementById('stat-sent').innerText = data.stats.sent;
                document.getElementById('stat-throttled').innerText = data.stats.throttled;
                document.getElementById('stat-grafana').innerText = data.stats.grafana;
                document.getElementById('stat-zabbix').innerText = data.stats.zabbix;

                // Update Messages
                const tbody = document.getElementById('msg-table');
                tbody.innerHTML = data.messages.map(m => `
                    <tr>
                        <td>${m.time}</td>
                        <td><span class="tag tag-info">${m.source}</span></td>
                        <td>${m.content}</td>
                        <td><span class="tag tag-success">SENT</span></td>
                    </tr>
                `).join('');

                // Update Logs
                const logList = document.getElementById('log-list');
                logList.innerHTML = data.logs.slice(0, 15).map(l => `
                    <div class="log-line">
                        [${l.time}] <span class="level-${l.level}">${l.level.toUpperCase()}</span>: ${l.message}
                    </div>
                `).join('');

            } catch (e) { console.error("Update failed", e); }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>

</html>
